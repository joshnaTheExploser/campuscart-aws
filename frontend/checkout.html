            display: none;

    <body>

        <div class="header">Checkout</div>

        <div class="container">
            <div class="card">

                <h2>Billing Details</h2>

                <form onsubmit="placeOrder(event)">

                    <input required placeholder="Full Name">

                    <input required placeholder="Phone Number">

                    <textarea required placeholder="Shipping Address"></textarea>

                    <div class="summary" id="summaryBox"></div>

                    <h3 id="total"></h3>

                    <!-- Payment Section -->
                    <h2>Payment Method</h2>

                    <select id="payment" required onchange="showPaymentFields()">
                        <option value="">Select Payment Method</option>
                        <option value="card">Debit/Credit Card</option>
                        <option value="upi">UPI</option>
                        <option value="cod">Cash on Delivery</option>
                    </select>

                    <div id="cardBox" style="display:none;">
                        <input id="cardNum" placeholder="Card Number" pattern="[0-9]{16}">
                        <input id="cardName" placeholder="Name on Card">
                        <input id="cvv" placeholder="CVV" pattern="[0-9]{3}">
                    </div>

                    <div id="upiBox" style="display:none;">
                        <input id="upi" placeholder="UPI ID (example@upi)">
                    </div>

                    <button>Place Order</button>

                </form>

            </div>
        </div>

        <!-- Login Modal -->
        <div class="modal-overlay" id="loginModal">
            <div class="modal-box">
                <h2>Login to Place Order</h2>
                <p>Please login to continue with your order.</p>
                <input type="text" id="loginName" placeholder="Your Name" required>
                <input type="email" id="loginEmail" placeholder="Your Email" required>
                <button class="btn-login" onclick="doLogin()">Login & Place Order</button>
                <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
            </div>
        </div>

        <script>
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            // Get user from localStorage
            let u = JSON.parse(localStorage.getItem("user"));

            // Ensure existing user has userId
            if (u && !u.userId) {
                u.userId = Date.now().toString();
                localStorage.setItem("user", JSON.stringify(u));
            }

            // Login modal functions
            function showLoginModal() {
                document.getElementById("loginModal").classList.add("active");
            }
            function closeLoginModal() {
                document.getElementById("loginModal").classList.remove("active");
            }
            function doLogin() {
                let name = document.getElementById("loginName").value;
                let email = document.getElementById("loginEmail").value;
                if (!name || !email) {
                    alert("Please fill in both name and email");
                    return;
                }
                u = { name: name, email: email, userId: Date.now().toString() };
                localStorage.setItem("user", JSON.stringify(u));
                closeLoginModal();
                // Now submit the form to trigger placeOrder again
                document.querySelector('form').requestSubmit();
            }
            let summary = "";
            let total = 0;

            cart.forEach(item => {
                summary += `<p>${item.name} × ${item.qty} = ₹${item.price * item.qty}</p>`;
                total += item.price * item.qty;
            });

            document.getElementById("summaryBox").innerHTML = summary || "No items";
            document.getElementById("total").innerHTML = "Total: ₹" + total;

            function showPaymentFields() {
                let method = document.getElementById("payment").value;
                document.getElementById("cardBox").style.display = "none";
                document.getElementById("upiBox").style.display = "none";
                if (method === "card") { document.getElementById("cardBox").style.display = "block"; }
                if (method === "upi") { document.getElementById("upiBox").style.display = "block"; }
            }

            
            
            function placeOrder(e) {
                e.preventDefault();

                // Check if user is logged in
                u = JSON.parse(localStorage.getItem("user"));
                if (!u || !u.userId) {
                    showLoginModal();
                    return;
                }

                let payment = document.getElementById("payment").value;
                if (payment === "") {
                    alert("Please select payment method");
                    return;
                }

                if (payment === "card") {
                    if (!cardNum.value || !cardName.value || !cvv.value) {
                        alert("Please fill card details");
                        return;
                    }
                }

                if (payment === "upi") {
                    if (!upi.value) {
                        alert("Enter UPI ID");
                        return;
                    }
                }


                // SAVE CURRENT USER (added feature — does not affect existing logic)
                const currentUser = {
                    name: document.querySelector('input[placeholder="Full Name"]').value,
                    phone: document.querySelector('input[placeholder="Phone Number"]').value,
                    address: document.querySelector('textarea[placeholder="Shipping Address"]').value
                };
                localStorage.setItem("currentUser", JSON.stringify(currentUser));



                // Prepare order data
                let orderData = {

                    invoice: "INV" + Date.now(),
                    items: cart,  // your current cart
                    total: cart.reduce((sum, i) => sum + (i.price * i.qty), 0),
                    name: document.querySelector('input[placeholder="Full Name"]').value,
                    phone: document.querySelector('input[placeholder="Phone Number"]').value,
                    address: document.querySelector('textarea[placeholder="Shipping Address"]').value,
                    payment_method: payment,
                    date: new Date(),
                    userId: u ? u.userId : null,
                };

                // **SAVE ORDER TO LOCALSTORAGE**
                let allOrders = JSON.parse(localStorage.getItem("orders")) || [];
                allOrders.push(orderData);
                localStorage.setItem("orders", JSON.stringify(allOrders));



                // SEND ORDER TO BACKEND DATABASE
                fetch("http://localhost:5000/order", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(orderData)
                })
                    .then(res => res.json())
                    .then(data => {
                        console.log("Saved to DB:", data);
                    })
                    .catch(err => {
                        console.log("Server error:", err);
                    });

                // redirect
                window.location = "invoice.html";
            }
        </script>
